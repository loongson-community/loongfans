version: "0.2"
language: en-US,en-GB
useGitignore: true
allowCompoundWords: true
dictionaries:
  - loongfans
  - companies
  - softwareTerms
  - misc
  - filetypes
  - npm
  - node
  - typescript
  - html
  - css
  - bash
  - cpp
words:
  - HDA
dictionaryDefinitions:
  - name: loongfans
    path: ./cspell.words.txt
ignorePaths:
  - node_modules
  - pages/public
  - pages/de
  - pages/fr
  - pages/ru
  - pages/parts/de
  - pages/parts/fr
  - pages/parts/ru
  - data/**/*.de.md
  - data/**/*.fr.md
  - data/**/*.ru.md
  - src/common/locales/de
  - src/common/locales/fr
  - src/common/locales/ru
  - src/common/locales/de.ts
  - src/common/locales/fr.ts
  - src/common/locales/ru.ts
  - package-lock.json
  - pnpm-lock.yaml
  - data/os/linux/uos.yml
