name: Edit Biweekly Events

on:
  workflow_dispatch:
    inputs:
      kind:
        description: "Event kind tag to edit"
        required: false
        default: "zhBiweekly"
        type: choice
        options:
          - zhBiweekly
          - enBiweekly
      issue_number:
        description: "Biweekly issue/session number to edit"
        required: false
        type: integer
      bvid:
        description: "Set BVID of the biweekly event to (optional)"
        required: false
        type: string
      slides_id:
        description: "Set Slides ID of the biweekly event to (optional)"
        required: false
        type: string
      bilibili_live_link:
        description: "Set the Bilibili live room link to (optional)"
        required: false
        type: string
      wemeet_link:
        description: "Set the Wemeet meeting link to (optional)"
        required: false
        type: string
      wemeet_number:
        description: "Set the Wemeet meeting number to (optional, in the typical hyphenated format)"
        required: false
        type: string
      zoom_link:
        description: "Set the Zoom meeting link to (optional)"
        required: false
        type: string
      zoom_chat_link:
        description: "Set the Zoom chat link to (optional)"
        required: false
        type: string
      google_docs_link:
        description: "Set the Google Docs/Slides link to (optional)"
        required: false
        type: string
      youtube_link:
        description: "Set the YouTube archive link to (optional)"
        required: false
        type: string
      vk_link:
        description: "Set the VK archive link to (optional)"
        required: false
        type: string

jobs:
  edit-biweekly-events:
    name: Edit Biweekly Events and Create PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate inputs
        run: |
          _provided_inputs=false
          [[ -n "${{ github.event.inputs.bvid }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.slides_id }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.bilibili_live_link }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.wemeet_link }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.wemeet_number }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.zoom_link }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.zoom_chat_link }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.google_docs_link }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.youtube_link }}" ]] && _provided_inputs=true
          [[ -n "${{ github.event.inputs.vk_link }}" ]] && _provided_inputs=true
          if ! "$_provided_inputs"; then
            echo "At least one edit input must be provided."
            exit 1
          fi
      - name: Check out the source code
        uses: actions/checkout@v6
      - name: Enable Corepack for PNPM
        run: corepack enable
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install

      - name: Configure Git user
        run: |
          # The following credentials does not work with GHES, but we don't
          # expect the repo to be hosted on GHES anyway.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make the edit
        run: |
          ARGS=()
          ARGS+=( --kind "${{ github.event.inputs.kind || 'zhBiweekly' }}" )
          if [[ -n "${{ github.event.inputs.issue_number }}" ]]; then
            ARGS+=( -i ${{ github.event.inputs.issue_number }} )
          fi
          if [[ -n "${{ github.event.inputs.bvid }}" ]]; then
            ARGS+=( --set-bvid "${{ github.event.inputs.bvid }}")
          fi
          if [[ -n "${{ github.event.inputs.slides_id }}" ]]; then
            ARGS+=( --set-slides "${{ github.event.inputs.slides_id }}")
          fi
          if [[ -n "${{ github.event.inputs.bilibili_live_link }}" ]]; then
            ARGS+=( --set-live-link "${{ github.event.inputs.bilibili_live_link }}")
          fi
          if [[ -n "${{ github.event.inputs.wemeet_link }}" ]]; then
            ARGS+=( --set-wemeet-link "${{ github.event.inputs.wemeet_link }}")
          fi
          if [[ -n "${{ github.event.inputs.wemeet_number }}" ]]; then
            ARGS+=( --set-wemeet-number "${{ github.event.inputs.wemeet_number }}")
          fi
          if [[ -n "${{ github.event.inputs.zoom_link }}" ]]; then
            ARGS+=( --set-zoom-link "${{ github.event.inputs.zoom_link }}")
          fi
          if [[ -n "${{ github.event.inputs.zoom_chat_link }}" ]]; then
            ARGS+=( --set-zoom-chat-link "${{ github.event.inputs.zoom_chat_link }}")
          fi
          if [[ -n "${{ github.event.inputs.google_docs_link }}" ]]; then
            ARGS+=( --set-google-docs-link "${{ github.event.inputs.google_docs_link }}")
          fi
          if [[ -n "${{ github.event.inputs.youtube_link }}" ]]; then
            ARGS+=( --set-youtube-link "${{ github.event.inputs.youtube_link }}")
          fi
          if [[ -n "${{ github.event.inputs.vk_link }}" ]]; then
            ARGS+=( --set-vk-link "${{ github.event.inputs.vk_link }}")
          fi
          ARGS+=( --commit )
          pnpm run editBiweeklyEvents "${ARGS[@]}"

      - name: Figure out the PR title
        id: pr_title
        run: |
          issue_number="${{ github.event.inputs.issue_number }}"
          kind="${{ github.event.inputs.kind || 'zhBiweekly' }}"
          if [[ -n ${issue_number} ]]; then
            echo "PR_TITLE=Update data for ${kind} ${issue_number}" >> $GITHUB_OUTPUT
          else
            echo "PR_TITLE=Update ${kind} event info" >> $GITHUB_OUTPUT
          fi

      - name: Create a PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: "edit-biweekly-${{ github.event.inputs.kind || 'zhBiweekly' }}-${{ github.event.inputs.issue_number || 'event-info' }}"
          branch-suffix: timestamp # always create a new branch
          delete-branch: true
          title: ${{ steps.pr_title.outputs.PR_TITLE }}
          body: |
            _This is an automated PR coming from the `edit-biweekly-data` workflow._
